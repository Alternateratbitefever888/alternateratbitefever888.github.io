<!DOCTYPE html>
<html>
<head>
<title>A1T STORE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'Poppins', sans-serif; margin:0; padding:0; box-sizing:border-box}
body{background:#0B1020; color:white}
.container{max-width:1100px; margin:auto; padding:15px; display:flex; gap:15px; flex-wrap:wrap}

.header{width:100%; background:#151B2F; padding:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center}
.header b{color:#3B82F6; font-size:20px}

.left{flex:2; min-width:320px}
.right{flex:1; min-width:300px}

.game-head{display:flex; align-items:center; gap:12px; margin-bottom:10px}
.game-head img{width:55px; height:55px; border-radius:15px}
.game-head h1{font-size:22px}
.game-head p{color:#06B6D4; font-size:13px}
.note{background:#151B2F; padding:10px; border-radius:10px; font-size:12px; color:#ffaa00; margin:10px 0}

.items{display:grid; grid-template-columns:repeat(2,1fr); gap:12px}
.item{background:#151B2F; border-radius:15px; padding:12px; display:flex; align-items:center; gap:12px; cursor:pointer; border:2px solid #222}
.item:hover{border-color:#3B82F6}
.item.selected{border-color:#06B6D4; background:#1a2342}
.item-left img{width:45px; height:45px}
.item-right b{font-size:15px}
.item-right p{font-size:11px; color:#aaa}
.price{margin-top:4px}
.price del{color:#777; font-size:11px}
.price span{color:#06B6D4; font-weight:700}

.order-box{background:#151B2F; padding:20px; border-radius:15px; position:sticky; top:15px}
.order-box h3{text-align:center; margin-bottom:15px}
.order-box input{width:100%; padding:12px; background:#0B1020; border:1px solid #2a3450; border-radius:10px; color:white; margin-bottom:10px}
.btn{width:100%; padding:14px; background:linear-gradient(90deg,#3B82F6,#06B6D4); border:none; border-radius:10px; color:white; font-weight:700; font-size:16px; cursor:pointer}

.preview{background:#151B2F; padding:20px; border-radius:15px; margin-top:15px}
.preview h3{margin-bottom:10px}
.preview p{display:flex; justify-content:space-between; margin:8px 0; font-size:14px}
.preview span{color:#aaa}

@media(max-width:768px){.container{flex-direction:column}}
</style>
</head>
<body>

<div class="container">
<div class="header"><b>A1T STORE</b> <span>👤</span></div>

<div class="left">
<div class="game-head">
<img id="gameLogo" src="https://img.icons8.com/color/96/mobile-legends.png">
<div>
<h1 id="gameName">Mobile Legends</h1>
<p>Instant Delivery</p>
</div>
</div>
<p class="note">Note: PLEASE ENTER CORRECT USER ID AND SERVER ID</p>

<div class="items" id="items"></div>
</div>

<div class="right">
<div class="order-box">
<h3>Order Information</h3>
<input type="text" id="uid" placeholder="Please Enter USER ID">
<input type="text" id="server" placeholder="Please Enter SERVER ID">
<button class="btn" onclick="sendWhatsApp()">Check & Order</button>
</div>

<div class="preview">
<h3>Payment Preview</h3>
<p>Item <span id="pItem">Not Selected</span></p>
<p>User ID <span id="pUID">Not Entered</span></p>
<p>Server <span id="pServer">Not Entered</span></p>
<p>Price <span id="pPrice">₹0</span></p>
</div>
</div>
</div>

<script>
let selectedItem = null;
let selectedPrice = 0;
const WA_NUMBER = "918638125856"; // Tera WhatsApp number

const games = {
mlbb: {
  logo: "https://img.icons8.com/color/96/mobile-legends.png",
  name: "Mobile Legends Bang",
  items: [
    {name:"5 Diamonds", price:"₹15", old:"₹20", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"11 Diamonds", price:"₹30", old:"₹30", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"14 Diamonds", price:"₹40", old:"₹40", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"22 Diamonds", price:"₹50", old:"₹50", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"42 Diamonds", price:"₹85", old:"₹85", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"86 Diamonds", price:"₹170", old:"₹200", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"172 Diamonds", price:"₹340", old:"₹400", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"Weekly Pass", price:"₹149", old:"₹190", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"Weekly Pass + 172", price:"₹394", old:"₹499", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"Twilight Pass", price:"₹750", old:"₹850", img:"https://img.icons8.com/color/48/diamond.png"}
  ]
},
ff: {
  logo: "https://img.icons8.com/color/96/free-fire.png",
  name: "Free Fire",
  items: [
    {name:"80 Diamonds", price:"₹80", old:"₹90", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"210 Diamonds", price:"₹200", old:"₹220", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"530 Diamonds", price:"₹500", old:"₹550", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"1080 Diamonds", price:"₹1000", old:"₹1100", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"Weekly Membership", price:"₹160", old:"₹180", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"Monthly Membership", price:"₹750", old:"₹800", img:"https://img.icons8.com/color/48/diamond.png"}
  ]
},
pubg: {
  logo: "https://img.icons8.com/color/96/pubg.png",
  name: "PUBG Mobile",
  items: [
    {name:"60 UC", price:"₹80", old:"₹90", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"325 UC", price:"₹400", old:"₹420", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"660 UC", price:"₹800", old:"₹850", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"1800 UC", price:"₹2000", old:"₹2100", img:"https://img.icons8.com/color/48/diamond.png"},
    {name:"Prime 1 Month", price:"₹250", old:"₹270", img:"https://img.icons8.com/color/48/diamond.png"}
  ]
}
};

let currentGame = 'mlbb';

function loadGame(game){
  currentGame = game;
  document.getElementById('gameLogo').src = games[game].logo;
  document.getElementById('gameName').innerText = games[game].name;

  let html = '';
  games[game].items.forEach((item, i)=>{
    html += `<div class="item" onclick="selectItem(${i})">
      <div class="item-left"><img src="${item.img}"></div>
      <div class="item-right">
        <b>${item.name}</b>
        <p>Instant Delivery</p>
        <div class="price"><del>${item.old}</del> <span>${item.price}</span></div>
      </div>
    </div>`;
  });
  document.getElementById('items').innerHTML = html;
}

function selectItem(i){
  document.querySelectorAll('.item').forEach(el=>el.classList.remove('selected'));
  document.querySelectorAll('.item')[i].classList.add('selected');
  selectedItem = games[currentGame].items[i].name;
  selectedPrice = games[currentGame].items[i].price;
  document.getElementById('pItem').innerText = selectedItem;
  document.getElementById('pPrice').innerText = selectedPrice;
}

function sendWhatsApp(){
  let uid = document.getElementById('uid').value;
  let server = document.getElementById('server').value;

  if(!selectedItem){ alert("Pehle koi pack select karo bhai"); return; }
  if(uid==''){ alert("UID daalo"); return; }

  document.getElementById('pUID').innerText = uid;
  document.getElementById('pServer').innerText = server || 'N/A';

  let msg = `*NEW ORDER - A1T STORE*%0A%0A` +
            `*Game:* ${games[currentGame].name}%0A` +
            `*Item:* ${selectedItem}%0A` +
            `*Price:* ${selectedPrice}%0A` +
            `*User ID:* ${uid}%0A` +
            `*Server ID:* ${server || 'N/A'}%0A%0A` +
            `Payment karne ke baad screenshot bhejna`;

  window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`, '_blank');
}

loadGame('mlbb'); // Default MLBB khulega
</script>

</body>
</html>
